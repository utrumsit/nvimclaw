name: Publish ClawHub Skill

on:
  pull_request:
    paths:
      - "skills/nvimclaw/**"
      - ".github/workflows/skill-publish.yml"
  workflow_dispatch:

jobs:
  dry-run:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g clawhub@latest
      - run: clawhub --workdir "$GITHUB_WORKSPACE" skill publish skills/nvimclaw --owner utrumsit --dry-run

  publish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g clawhub@latest
      - run: clawhub login --token "$CLAWHUB_TOKEN"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
      - run: clawhub --workdir "$GITHUB_WORKSPACE" skill publish skills/nvimclaw --owner utrumsit
